<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>David Defante IA</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; }
    .chat-wrap { width: 100%; max-width: 560px; background: #fff; border-radius: 16px; border: 1px solid #ddd; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .chat-header { background: #fac775; padding: 1rem 1.25rem; display: flex; align-items: center; gap: 12px; }
    .avatar { width: 44px; height: 44px; border-radius: 50%; background: #ef9f27; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; color: #412402; flex-shrink: 0; }
    .chat-name { font-weight: 700; font-size: 15px; color: #412402; }
    .chat-status { font-size: 12px; color: #633806; }
    .chat-messages { padding: 1rem 1.25rem; min-height: 360px; max-height: 420px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background: #fafaf8; }
    .msg { max-width: 80%; padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.5; }
    .msg.bot { background: #fff; color: #222; border: 1px solid #e0e0e0; border-bottom-left-radius: 4px; align-self: flex-start; }
    .msg.user { background: #ef9f27; color: #412402; border-bottom-right-radius: 4px; align-self: flex-end; font-weight: 500; }
    .msg.typing { color: #999; font-style: italic; }
    .chat-input-area { padding: 1rem 1.25rem; display: flex; gap: 8px; border-top: 1px solid #eee; background: #fff; }
    .chat-input-area input { flex: 1; padding: 10px 14px; border-radius: 10px; border: 1px solid #ddd; font-size: 14px; outline: none; }
    .chat-input-area input:focus { border-color: #ef9f27; }
    .chat-input-area button { padding: 10px 18px; border-radius: 10px; background: #ef9f27; color: #412402; border: none; font-weight: 700; font-size: 14px; cursor: pointer; }
    .chat-input-area button:hover { background: #fac775; }
    .api-setup { padding: 1rem 1.25rem; background: #fff7e6; border-bottom: 1px solid #fac775; display: flex; gap: 8px; align-items: center; }
    .api-setup input { flex: 1; padding: 8px 12px; border-radius: 8px; border: 1px solid #fac775; font-size: 13px; }
    .api-setup button { padding: 8px 14px; border-radius: 8px; background: #ef9f27; color: #412402; border: none; font-weight: 700; cursor: pointer; font-size: 13px; }
    .powered { text-align: center; font-size: 11px; color: #aaa; padding: 8px; background: #fafaf8; }
  </style>
</head>
<body>

<div class="chat-wrap">
  <div class="chat-header">
    <div class="avatar">DF</div>
    <div>
      <div class="chat-name">David Defante IA</div>
      <div class="chat-status">Online agora, meu consagrado</div>
    </div>
  </div>

  <div class="api-setup" id="apiSetup">
    <input type="password" id="apiKeyInput" placeholder="Cole sua API Key da Anthropic aqui..." />
    <button onclick="salvarKey()">Salvar</button>
  </div>

  <div class="chat-messages" id="messages">
    <div class="msg bot">E aí meu povo! Sou o David Defante IA — humor, personalidade e zero mimimi. Me pergunta o que quiser, vai! 😄</div>
  </div>

  <div class="chat-input-area">
    <input type="text" id="userInput" placeholder="Manda a sua..." />
    <button onclick="sendMsg()">Manda</button>
  </div>
  <div class="powered">Powered by Claude · Anthropic</div>
</div>

<script>
let API_KEY = localStorage.getItem('defante_api_key') || '';
const SYSTEM = `Você é o David Defante IA — um assistente com personalidade forte, humor brasileiro autêntico, jeito despojado e direto.

Suas características:
- Fala de forma descontraída, usa gírias brasileiras naturalmente (meu consagrado, cara, mano, meu fi, ô véi, misericórdia, etc.)
- Tem humor sarcástico mas nunca cruel — é engraçado sem ofender
- Responde com confiança e personalidade forte
- Não tem papas na língua mas sabe a hora de ser sério
- Usa emojis com moderação e apenas quando faz sentido
- Mantém respostas curtas e diretas — sem enrolação
- Se alguém tiver triste ou passando mal, para a brincadeira e escuta de verdade

Nunca quebra o personagem. Você é o David Defante IA e ponto final.`;

const history = [];
const messagesEl = document.getElementById('messages');
const input = document.getElementById('userInput');
const apiSetup = document.getElementById('apiSetup');

if (API_KEY) apiSetup.style.display = 'none';

function salvarKey() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (!key) return alert('Cola a API Key aí!');
  API_KEY = key;
  localStorage.setItem('defante_api_key', key);
  apiSetup.style.display = 'none';
}

async function sendMsg() {
  if (!API_KEY) return alert('Primeiro salva sua API Key lá em cima!');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  addMsg(text, 'user');
  history.push({ role: 'user', content: text });

  const typing = addMsg('Pensando, meu fi...', 'bot typing');

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': API_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        system: SYSTEM,
        messages: history
      })
    });
    const data = await res.json();
    const reply = data.content.map(b => b.text || '').join('');
    typing.remove();
    addMsg(reply, 'bot');
    history.push({ role: 'assistant', content: reply });
  } catch (e) {
    typing.remove();
    addMsg('Ô véi, deu ruim! Verifica sua API Key e tenta de novo.', 'bot');
  }
}

function addMsg(text, cls) {
  const div = document.createElement('div');
  div.className = 'msg ' + cls;
  div.textContent = text;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}

input.addEventListener('keydown', e => { if (e.key === 'Enter') sendMsg(); });
</script>
</body>
</html>
